# Baseline Configuration: Single-Frame Visual Encoding
# This replicates your original 7th semester paper for ablation comparison

experiment_name: baseline_single_frame

# Model Configuration
model:
  model_type: baseline  # 'baseline' or 'temporal'
  
  # Audio encoder
  audio_model: facebook/wav2vec2-base-960h
  freeze_wav2vec: true
  
  # Visual encoder (SINGLE FRAME)
  visual_model: dinov2_vitl14
  freeze_dinov2: true
  num_frames: 1  # Single frame for baseline
  
  # Fusion
  fusion_dim: 512
  fusion_method: transformer  # 'transformer', 'attention', or 'concat'
  num_fusion_heads: 8
  num_fusion_layers: 2
  
  # Training
  dropout: 0.1
  num_classes: 6  # Will be overridden by dataset

# Training Configuration
training:
  num_epochs: 50
  batch_size: 8  # Adjust based on GPU memory
  
  optimizer:
    type: adamw
    lr: 0.0001
    weight_decay: 0.01
  
  # Learning rate scheduling
  lr_scheduler:
    type: plateau
    factor: 0.5
    patience: 5
  
  # Early stopping
  early_stopping:
    patience: 10
    min_delta: 0.001

# Data Configuration
data:
  img_size: 224
  sampling_method: uniform
  augmentation: true
  num_workers: 4
