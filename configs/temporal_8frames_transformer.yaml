# Temporal Configuration: 8-Frame with Temporal Transformer
# This is the STRONGER approach (Option A2) - more parameters

experiment_name: temporal_8frames_transformer

# Model Configuration
model:
  model_type: temporal
  
  # Audio encoder
  audio_model: facebook/wav2vec2-base-960h
  freeze_wav2vec: true
  
  # Visual encoder (TEMPORAL TRANSFORMER)
  visual_model: dinov2_vitl14
  freeze_dinov2: true
  num_frames: 8
  temporal_method: transformer  # Full transformer encoder
  num_temporal_heads: 8  # Attention heads for temporal transformer
  num_temporal_layers: 2  # Transformer layers
  
  # Fusion
  fusion_dim: 512
  fusion_method: transformer
  num_fusion_heads: 8
  num_fusion_layers: 2
  
  # Training
  dropout: 0.1
  num_classes: 6

# Training Configuration
training:
  num_epochs: 50
  batch_size: 6
  
  optimizer:
    type: adamw
    lr: 0.0001
    weight_decay: 0.01
  
  lr_scheduler:
    type: plateau
    factor: 0.5
    patience: 5
  
  early_stopping:
    patience: 10
    min_delta: 0.001

# Data Configuration
data:
  img_size: 224
  sampling_method: uniform
  augmentation: true
  num_workers: 4
